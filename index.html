<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lions Attendance System - District 325 F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .present-row { border-left: 5px solid #22c55e; }
        .absent-row { border-left: 5px solid #ef4444; }
        
        /* स्पिनर लोडर */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3a8a;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between">

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0zczW1dhKkdFDmbvsXgTQi1hG9TPPLXXzbbyeHCeba2wjolynPB0RTNtdsWy0S1jR/exec";

        // कस्टम डायलग बक्स देखाउने फङ्सन (Custom Dialog Box)
        function showDialog(title, message, isSuccess = true) {
            const dialogBox = document.getElementById('customDialog');
            const dialogTitle = document.getElementById('dialogTitle');
            const dialogMessage = document.getElementById('dialogMessage');
            const dialogIcon = document.getElementById('dialogIcon');
            const dialogBtn = document.getElementById('dialogBtn');

            // यदि सफल भयो भने हरियो रङ, असफल भयो भने रातो रङको थिम सेट गर्ने
            if(isSuccess) {
                dialogTitle.className = "text-xl font-bold text-green-600 mb-2";
                dialogIcon.innerHTML = "✅";
                dialogBtn.className = "w-full bg-green-600 text-white p-2 rounded font-bold hover:bg-green-700 transition";
            } else {
                dialogTitle.className = "text-xl font-bold text-red-600 mb-2";
                dialogIcon.innerHTML = "❌";
                dialogBtn.className = "w-full bg-red-600 text-white p-2 rounded font-bold hover:bg-red-700 transition";
            }

            dialogTitle.innerText = title;
            dialogMessage.innerText = message;
            dialogBox.classList.remove('hidden');
        }

        // डायलग बक्स बन्द गर्ने फङ्सन
        function closeDialog() {
            document.getElementById('customDialog').classList.add('hidden');
        }

        async function loadSystemStatus() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getSystemStatus");
                const status = await response.json();
                
                const daySelect = document.getElementById('attendanceDay');
                const dayText = document.getElementById('currentDayText');

                if (status.day1 === "Active" && status.day2 === "Active") {
                    dayText.innerText = "Attendance Open (Day-1 & Day-2 Active)";
                } else if (status.day1 === "Active") {
                    daySelect.value = "Day-1";
                    daySelect.options[1].disabled = true;
                    dayText.innerText = "Attendance Day-1 (Active)";
                } else if (status.day2 === "Active") {
                    daySelect.value = "Day-2";
                    daySelect.options[0].disabled = true;
                    dayText.innerText = "Attendance Day-2 (Active)";
                } else {
                    daySelect.options[0].disabled = true;
                    daySelect.options[1].disabled = true;
                    dayText.innerText = "Attendance Closed (सिटबाट बन्द छ)";
                }
            } catch(e) {
                document.getElementById('currentDayText').innerText = "सिस्टम जडानमा समस्या भयो ।";
            }
        }

        async function submitAttendance() {
            const lionsId = document.getElementById('lionsId').value;
            const selectedDay = document.getElementById('attendanceDay').value;
            if(!lionsId) {
                showDialog("चेतावनी !", "कृपया आफ्नो Lions ID वा दर्ता नम्बर हाल्नुहोस् ।", false);
                return;
            }

            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            loadingOverlay.classList.remove('hidden');
            loadingText.innerText = "तपाईँको मोबाइलको लोकेसन (GPS) जाँच्दै... कृपया पर्खिनुहोस् ।";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                loadingText.innerText = "विवरण रुजु गरिँदै र हाजिर सेभ हुँदैछ...";

                try {
                    const payload = {
                        action: "submitAttendance",
                        lionsId: lionsId,
                        day: selectedDay,
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        deviceId: navigator.userAgent
                    };

                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const msg = await response.text();
                    
                    loadingOverlay.classList.add('hidden');
                    submitBtn.disabled = false;

                    // पुराना alert() हटाएर कस्टम डायलग बक्समा नतिजा देखाउने
                    if(msg === "Success") {
                        showDialog("हाजिर सफल !", "तपाईँको आजको डिजिटल हाजिर सफलतापूर्वक दर्ता भयो । धन्यवाद !", true);
                    } else {
                        showDialog("हाजिर हुन सकेन", msg, false);
                    }
                    
                    loadSystemStatus();
                } catch (error) {
                    loadingOverlay.classList.add('hidden');
                    submitBtn.disabled = false;
                    showDialog("सिस्टम एरर", "सर्भरसँग जडान हुन सकेन । कृपया इन्टरनेट चेक गरी पुनः प्रयास गर्नुहोस् ।", false);
                }
            }, () => {
                loadingOverlay.classList.add('hidden');
                submitBtn.disabled = false;
                showDialog("लोकेसन समस्या", "कृपया मोबाइलको GPS/Location अन गर्नुहोस् र यो ब्राउजरलाई लोकेसनको अनुमति (Permission) दिनुहोस् ।", false);
                loadSystemStatus();
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        function showPage(pageId) {
            document.getElementById('userSection').classList.add('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('reportDashboard').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        async function adminLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "adminLogin", username: user, password: pass })
            });
            const result = await response.json();

            if(result.status === "success") {
                showPage('reportDashboard');
                updateAdminPanelUI(result.day1Active, result.day2Active);
                loadReport();
            } else {
                showDialog("लगइन असफल", result.message || "विवरण मिलेन वा अकाउन्ट डिएक्टिभ छ ।", false);
            }
        }

        function updateAdminPanelUI(d1, d2) {
            document.getElementById('d1SheetStatus').innerText = "Sheet Status: " + d1;
            document.getElementById('d2SheetStatus').innerText = "Sheet Status: " + d2;
            
            if(d1 !== "Active") {
                document.getElementById('btnStartD1').disabled = true;
                document.getElementById('btnStartD1').classList.replace('bg-blue-600', 'bg-gray-400');
            }
            if(d2 !== "Active") {
                document.getElementById('btnStartD2').disabled = true;
                document.getElementById('btnStartD2').classList.replace('bg-blue-600', 'bg-gray-400');
            }
        }

        function startLiveAttendance(day) {
            showDialog("लाइभ सुरु भयो", day + " हाजिर प्रणाली सुरु भयो । ढिलो आउनेको नाम तलको 'Absent List' मा हेरी रुजु गरेर हलको क्युआर देखाउनुहोस् ।", true);
        }

        async function loadReport() {
            document.getElementById('reportData').innerHTML = "रिपोर्ट लोड हुँदैछ...";
            const response = await fetch(SCRIPT_URL + "?action=getReport");
            const data = await response.json();
            
            let html = `<h3 class="font-bold text-green-600 mb-2">उपस्थित साथीहरू (${data.present.length})</h3>`;
            data.present.forEach(p => {
                html += `<div class="bg-white p-3 mb-2 shadow-sm present-row font-semibold">✅ ${p.name} - <span class="text-xs text-gray-500">${p.club} [${p.desig}]</span></div>`;
            });

            html += `<h3 class="font-bold text-red-600 mt-6 mb-2">हाजिर हुन बाँकी (Absent List) (${data.absent.length})</h3>`;
            data.absent.forEach(a => {
                html += `<div class="bg-white p-3 mb-2 shadow-sm absent-row flex justify-between items-center">
                    <div>❌ <span class="font-bold">${a.name}</span> - <span class="text-xs text-gray-500">${a.club} [${a.desig}]</span></div>
                    <button onclick="showDialog('मद्दत कक्ष', 'यो सहभागीलाई हलको क्युआर कोड देखाउनुहोस् र मोबाइलबाट आईडी ${a.id} सबमिट गर्न भन्नुहोस् ।', true)" class="bg-blue-600 text-white text-xs px-2 py-1 rounded font-bold">Verify & Show QR</button>
                </div>`;
            });

            document.getElementById('reportData').innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', loadSystemStatus);
    </script>

    <div class="max-w-md w-full mx-auto p-6 flex-grow flex flex-col justify-center relative">
        
        <div id="customDialog" class="hidden fixed inset-0 bg-black bg-opacity-60 flex flex-col justify-center items-center z-50 p-6 text-center">
            <div class="bg-white p-6 rounded-xl shadow-2xl flex flex-col items-center max-w-sm w-full border-t-8 border-blue-900 animate-bounce-short">
                <div id="dialogIcon" class="text-4xl mb-2"></div>
                <h3 id="dialogTitle" class="text-xl font-bold mb-2">शीर्षक</h3>
                <p id="dialogMessage" class="text-sm text-gray-600 font-medium mb-6">यहाँ सन्देश देखिनेछ ।</p>
                <button id="dialogBtn" onclick="closeDialog()" class="w-full bg-blue-900 text-white p-2 rounded font-bold transition">OK</button>
            </div>
        </div>

        <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex flex-col justify-center items-center z-50 p-6 text-center">
            <div class="bg-white p-6 rounded-lg shadow-xl flex flex-col items-center max-w-xs w-full">
                <div class="loader mb-4"></div>
                <p id="loadingText" class="text-sm font-bold text-gray-800">प्रक्रिया सुरु हुँदैछ...</p>
            </div>
        </div>
        
        <div id="userSection" class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold text-blue-900 mb-1 text-center">Lions International</h2>
            <h3 class="text-xl font-semibold text-blue-800 mb-1 text-center">District 325 F</h3>
            <p id="currentDayText" class="text-center font-medium text-gray-700 mb-4">लोड हुँदैछ...</p>
            
            <label class="block text-sm font-medium text-gray-600 mb-1">Select Attendance Day:</label>
            <select id="attendanceDay" class="w-full border p-2 mb-4 rounded bg-gray-50 font-semibold text-gray-700">
                <option value="Day-1">Attendance Day-1</option>
                <option value="Day-2">Attendance Day-2</option>
            </select>

            <input type="text" id="lionsId" placeholder="Lions ID / Reg No" class="w-full border p-2 mb-4 rounded">
            <button id="submitBtn" onclick="submitAttendance()" class="w-full bg-blue-900 text-white p-3 rounded font-bold tracking-wide hover:bg-blue-950 transition">SUBMIT ATTENDANCE</button>
        </div>

        <div id="loginForm" class="hidden bg-gray-200 p-6 rounded-lg shadow-md border-t-4 border-gray-700">
            <h3 class="text-lg font-bold text-gray-800 text-center mb-4">Admin Login Panel</h3>
            <input type="text" id="user" placeholder="Username" class="w-full border p-2 mb-2 rounded bg-white">
            <input type="password" id="pass" placeholder="Password" class="w-full border p-2 mb-4 rounded bg-white">
            <button onclick="adminLogin()" class="w-full bg-gray-800 text-white p-2 rounded font-bold hover:bg-gray-900 transition mb-2">LOGIN ADMIN</button>
            <button onclick="showPage('userSection')" class="w-full text-xs text-gray-600 text-center underline font-semibold mt-2">← Back to Attendance Form</button>
        </div>

        <div id="reportDashboard" class="hidden bg-white p-4 rounded-lg shadow-lg mt-4">
            <div class="flex justify-between items-center border-b pb-2 mb-4">
                <h2 class="text-xl font-bold text-gray-800">Admin Control Room</h2>
                <button onclick="showPage('userSection')" class="text-xs bg-gray-500 text-white px-2 py-1 rounded font-bold">Logout</button>
            </div>
            
            <div class="mb-4 p-2 bg-gray-50 rounded border">
                <span class="font-bold text-sm block mb-1">Day-1 Attendance: <span id="d1SheetStatus" class="text-blue-600"></span></span>
                <button id="btnStartD1" onclick="startLiveAttendance('Day-1')" class="bg-blue-600 text-white text-xs px-3 py-1 rounded font-bold transition">START LIVE</button>
            </div>

            <div class="mb-6 p-2 bg-gray-50 rounded border">
                <span class="font-bold text-sm block mb-1">Day-2 Attendance: <span id="d2SheetStatus" class="text-blue-600"></span></span>
                <button id="btnStartD2" onclick="startLiveAttendance('Day-2')" class="bg-blue-600 text-white text-xs px-3 py-1 rounded font-bold transition">START LIVE</button>
            </div>

            <h2 class="text-xl font-bold mb-2 text-gray-800">Live Attendance Report</h2>
            <button onclick="loadReport()" class="bg-green-600 text-white px-4 py-2 rounded mb-4 text-sm font-semibold shadow hover:bg-green-700 transition">Refresh Data</button>
            <div id="reportData"></div>
        </div>

    </div>

    <div class="p-4 text-center">
        <button onclick="showPage('loginForm')" class="text-xs text-gray-400 hover:text-gray-600 transition font-medium">[ Admin Login ]</button>
    </div>

</body>
</html>
